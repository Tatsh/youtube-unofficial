jobs:
  build:
    env:
      WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE }}
      APPLE_SIGNING_CERT: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - name: 'Install yq'
        run: 'pipx install yq'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@v8.0.0'
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6.2.0'
        with:
          python-version: '3.13'
      - name: 'Install dependencies (uv)'
        run: |
          uv sync
          uv pip install pyinstaller
        shell: 'bash'
      - name: 'Build with PyInstaller'
        run: |
          project_name=$(tomlq -r '.project.urls.repository|split("/")[-1]' pyproject.toml)
          vers="$(tomlq -r '.project.version|split(".")|map(tonumber)|@csv' pyproject.toml),0"
          version=$(tomlq -r .project.version pyproject.toml)
          while IFS=$' ' read -r script_name python_path func_name; do
              func_name="${func_name#"${func_name%%[![:space:]]*}"}"
              func_name="${func_name%"${func_name##*[![:space:]]}"}"
              cat > temp_script.py <<EOF
          from ${python_path} import ${func_name}
          if __name__ == '__main__':
              ${func_name}()
          EOF
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat temp_script.py
              fi
              cat > version-info.txt <<EOF
          VSVersionInfo(
              ffi=FixedFileInfo(date=(0, 0),
                                filevers=(${vers}),
                                fileType=0x1,
                                flags=0x0,
                                mask=0x3f,
                                OS=0x4,
                                prodvers=(${vers}),
                                subtype=0x0),
              kids=[
                  StringFileInfo([
                      StringTable('040904B0', [
                          StringStruct('CompanyName', 'Tatsh'),
                          StringStruct(
                              'FileDescription',
                              '${script_name} from ${project_name}. - ${{ github.server_url }}/${{ github.repository }}'
                          ),
                          StringStruct('FileVersion', '${version}'),
                          StringStruct('InternalName', '${script_name}.exe'),
                          StringStruct('LegalCopyright', 'Copyright (c) ${project_name} authors.'),
                          StringStruct('OriginalFilename', '${script_name}.exe'),
                          StringStruct('ProductName', '${project_name}'),
                          StringStruct('ProductVersion', '${version}')
                      ])
                  ]),
                  VarFileInfo([VarStruct('Translation', [0x409, 1200, 0x809, 1252])])
              ])
          EOF
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat version-info.txt
              fi
              echo "Building executable for '${script_name}'..."
              uv run pyinstaller --log-level ERROR --onefile -n "${script_name}" --optimize 1 \
                --hidden-import colorlog \
                -y --version-file version-info.txt \
                temp_script.py
              if [[ "${ACTIONS_RUNNER_DEBUG}" == 'true' ]]; then
                  cat "${script_name}.spec"
              fi
          done < <(tomlq -r '.project.scripts|to_entries[]|"\(.key) \(.value|split(":")|join(" "))"' pyproject.toml)
        shell: 'bash'
      - if: (matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm') && env.WINDOWS_SIGNING_CERT != ''
        name: 'Sign Windows binaries'
        env:
          SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
          TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $timestampArgs = @()
          if ($env:TIMESTAMP_URL) {
            $timestampArgs = @('/tr', $env:TIMESTAMP_URL, '/td', 'sha256')
          }
          foreach ($exe in (Get-ChildItem -Path dist\*.exe)) {
            Write-Host "Signing '$($exe.Name)'..."
            & signtool sign /f $certPath /p $env:SIGNING_PASSWORD @timestampArgs /fd sha256 $exe.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $($exe.Name)" }
          }
          Remove-Item $certPath
        shell: 'pwsh'
      - if: matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm'
        name: 'Test binary'
        run: |
          $distFiles = Get-ChildItem -Path dist\*.exe
          Write-Host "Found $($distFiles.Count) files in dist/: $(( $distFiles | ForEach-Object { $_.Name } ) -join ', ')"
          foreach ($file in $distFiles) {
            Write-Host "Testing '$($file.FullName)'."
            & $file.FullName --help
          }
      - if: (matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel') && env.APPLE_SIGNING_CERT != ''
        name: 'Sign and notarise macOS binaries'
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          keychain="$RUNNER_TEMP/signing.keychain-db"
          cert_path="$RUNNER_TEMP/cert.p12"
          base64 -d <<<"$APPLE_CERT_BASE64" > "$cert_path"
          security create-keychain -p '' "$keychain"
          security set-keychain-settings "$keychain"
          security unlock-keychain -p '' "$keychain"
          security import "$cert_path" -k "$keychain" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S 'apple-tool:,apple:' -k '' "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          for file in dist/*; do
            if [[ "${file}" == dist/index.*js ]]; then
              continue
            fi
            echo "Signing '${file}'..."
            codesign --force --options runtime --sign "$APPLE_IDENTITY" --timestamp "$file"
          done
          zip_path="$RUNNER_TEMP/notarize.zip"
          zip -j "$zip_path" dist/*
          xcrun notarytool submit "$zip_path" \
            --apple-id "$APPLE_ID_EMAIL" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM" \
            --wait
          for file in dist/*; do
            if [[ "${file}" == dist/index.*js ]]; then
              continue
            fi
            xcrun stapler staple "$file" || true
          done
          rm -f "$cert_path" "$zip_path"
          security delete-keychain "$keychain"
        shell: 'bash'
      - if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        name: 'Test binary'
        run: |
          dist_files=(dist/*)
          echo "Found ${#dist_files[@]} files in dist/: ${dist_files[*]##*/}"
          for file in "${dist_files[@]}"; do
              if [[ "${file}" == dist/index.*js ]]; then
                  echo "Skipping index.js."
                  continue
              fi
              echo "Testing '${file}'."
              "./${file}" --help
          done
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7.0.1'
        with:
          if-no-files-found: error
          name: youtube-unofficial-binaries-${{ matrix.suffix }}
          path: |
            ${{ matrix.dist_path }}
      - name: 'Attest'
        uses: 'actions/attest@v4.1.0'
        with:
          subject-path: '${{ matrix.dist_path }}'
      - name: 'Generate SBOM'
        uses: 'anchore/sbom-action@v0.24.0'
        env:
          SYFT_SOURCE_NAME: 'youtube-unofficial'
          SYFT_SOURCE_VERSION: ${{ github.ref_name }}
        with:
          path: 'dist/'
          output-file: 'sbom.spdx.json'
          upload-artifact: false
      - name: 'Attest SBOM'
        uses: 'actions/attest@v4.1.0'
        with:
          subject-path: '${{ matrix.dist_path }}'
          sbom-path: 'sbom.spdx.json'
      - if: (matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel') && github.ref_type == 'tag'
        name: 'Zip files'
        run: |
          rm -fR _out
          mkdir _out
          zip -j _out/youtube-unofficial-${{ github.ref_name }}-${{ matrix.suffix }}.zip ${{ matrix.dist_path }}
      - if: (matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm') && github.ref_type == 'tag'
        name: 'Zip files'
        run: |
          Remove-Item -Force _out -ErrorAction Continue
          New-Item -ItemType Directory -Name _out
          Compress-Archive -Path ${{ matrix.dist_path }} -DestinationPath _out/youtube-unofficial-${{ github.ref_name }}-${{ matrix.suffix }}.zip
        shell: pwsh
      - if: github.ref_type == 'tag'
        name: 'Attest'
        uses: 'actions/attest@v4.1.0'
        with:
          subject-path: '_out/*.zip'
      - if: github.ref_type == 'tag'
        name: 'Attest SBOM'
        uses: 'actions/attest@v4.1.0'
        with:
          subject-path: '_out/*.zip'
          sbom-path: 'sbom.spdx.json'
      - if: github.ref_type == 'tag'
        name: Upload package
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            _out/*.zip
    strategy:
      matrix:
        include:
          - os: 'macos-15-intel'
            dist_path: 'dist/*'
            suffix: 'mac-x86_64'
          - os: 'macos-latest'
            dist_path: 'dist/*'
            suffix: 'mac-arm64'
          - os: 'windows-latest'
            dist_path: 'dist/*.exe'
            suffix: 'win-x86_64'
          - os: 'windows-11-arm'
            dist_path: 'dist/*.exe'
            suffix: 'win-arm64'
name: 'PyInstaller'
'on':
  push:
    branches:
      - 'master'
    paths:
      - 'youtube_unofficial/**'
      - '.github/workflows/pyinstaller.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'poetry.lock'
    tags:
      - 'v*.*.*'
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
