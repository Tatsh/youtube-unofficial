jobs:
  check:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - env:
          COMMIT_SHA: '${{ github.sha }}'
          GH_TOKEN: '${{ github.token }}'
        id: 'check'
        name: 'Wait for workflows'
        run: |
          sha="$COMMIT_SHA"
          for i in $(seq 1 30); do
            all_done=true
            for workflow in AppImage Flatpak Prettier PyInstaller QA Snap Spelling Tests markdownlint; do
              status=$(gh run list --workflow "$workflow" --commit "$sha" --json conclusion --jq '.[0].conclusion')
              if [[ "$status" == 'failure' || "$status" == 'cancelled' ]]; then
                echo "::error::Workflow '$workflow' ${status}."
                exit 1
              elif [[ "$status" != 'success' ]]; then
                echo "Workflow '$workflow' still pending."
                all_done=false
              fi
            done
            if [[ "$all_done" == 'true' ]]; then
              echo 'All workflows succeeded.'
              exit 0
            fi
            echo "Waiting 60s for workflows to complete (attempt ${i}/30)..."
            sleep 60
          done
          echo '::error::Timed out waiting for workflows.'
          exit 1
  publish:
    needs:
      - 'check'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - uses: 'actions/setup-python@v6.2.0'
        with:
          python-version: '3.13'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@v8.0.0'
      - run: 'uv build'
      - uses: 'pypa/gh-action-pypi-publish@release/v1'
      - uses: 'softprops/action-gh-release@v3.0.0'
        with:
          draft: true
          files: |
            dist/*.tar.gz
            dist/*.whl
name: 'Publish'
'on':
  push:
    tags:
      - 'v*'
permissions:
  contents: 'write'
  id-token: 'write'
