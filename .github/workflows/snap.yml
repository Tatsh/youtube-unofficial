jobs:
  build:
    runs-on: '${{ matrix.system.image }}'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - id: 'build'
        name: 'Build Snap package'
        uses: 'snapcore/action-build@v1.3.0'
        with:
          snapcraft-args: 'pack'
          snapcraft-channel: 'latest/stable'
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7.0.1'
        with:
          if-no-files-found: 'error'
          name: 'youtube-unofficial-snap-${{ matrix.system.arch }}'
          path: '*.snap'
      - name: 'Attest'
        uses: 'actions/attest@v4.1.0'
        with:
          subject-path: '*.snap'
      - if: "github.ref_type == 'tag'"
        name: 'Upload package'
        uses: 'softprops/action-gh-release@v3.0.0'
        with:
          draft: true
          fail_on_unmatched_files: true
          files: '*.snap'
    strategy:
      matrix:
        system:
          - arch: 'amd64'
            image: 'ubuntu-24.04'
          - arch: 'arm64'
            image: 'ubuntu-24.04-arm'
name: 'Snap'
'on':
  push:
    branches:
      - 'master'
    paths:
      - 'youtube_unofficial/**'
      - '.github/workflows/snap.yml'
      - 'pyproject.toml'
      - 'snapcraft.yaml'
      - 'uv.lock'
      - 'poetry.lock'
    tags:
      - 'v*.*.*'
  workflow_dispatch: null
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
