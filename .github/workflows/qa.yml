jobs:
  format:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@v8.0.0'
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6.2.0'
        with:
          python-version: '3.10'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --all-extras'
      - name: 'Check formatting (YAPF)'
        run: 'uv run yapf --diff --parallel --recursive .'
  mypy:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@v8.0.0'
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6.2.0'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Lint with mypy'
        run: 'uv run mypy .'
  ruff:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - name: 'Lint with Ruff'
        uses: 'astral-sh/ruff-action@v3.6.1'
name: 'QA'
'on':
  pull_request:
    branches:
      - 'master'
    paths:
      - '**/*.py'
      - '**/*.pyi'
      - '.github/workflows/qa.yml'
      - 'pyproject.toml'
      - 'tests/pyproject.toml'
  push:
    branches:
      - 'master'
    paths:
      - '**/*.py'
      - '**/*.pyi'
      - '.github/workflows/qa.yml'
      - 'pyproject.toml'
      - 'tests/pyproject.toml'
permissions:
  contents: 'read'
