build:
  apt_packages: []
  jobs:
    post_install:
      - 'pip install uv'
      - 'UV_PROJECT_ENVIRONMENT="$READTHEDOCS_VIRTUALENV_PATH" uv sync --group docs --inexact --all-extras --no-dev'
  os: 'ubuntu-22.04'
  tools:
    python: '3.12'
sphinx:
  configuration: 'docs/conf.py'
  fail_on_warning: true
version: 2
